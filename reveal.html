<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Complete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #48bb78;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .checkmark {
            font-size: 5em;
            margin: 20px 0;
        }

        p {
            font-size: 1.2em;
            color: #666;
            margin: 15px 0;
            line-height: 1.6;
        }

        .redirect-text {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #48bb78;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✅</div>
        <h1>Verification Complete!</h1>
        <p>Thank you for completing the verification!</p>

        <div class="redirect-text">
            Redirecting you back to get your key...
        </div>

        <div class="spinner"></div>
    </div>

    <script>
        // Get the session, user, and token from URL parameters
        function getURLParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                session: urlParams.get('session'),
                user: urlParams.get('user'),
                token: urlParams.get('token')  // Linkvertise adds this after completion
            };
        }

        // Redirect back to key page with verified flag
        window.onload = function() {
            const params = getURLParams();

            // Wait 2 seconds then redirect back
            setTimeout(() => {
                if (params.session && params.user) {
                    // Redirect back to the key page with verified=true and token
                    let redirectUrl = `https://robloxblast.github.io/Key-system/key_page.html?session=${params.session}&user=${params.user}&verified=true`;

                    // Add token if it exists (Linkvertise provides this)
                    if (params.token) {
                        redirectUrl += `&token=${params.token}`;
                    }

                    window.location.href = redirectUrl;
                } else {
                    // No session found, redirect to Discord
                    window.location.href = 'https://discord.com/channels/@me';
                }
            }, 2000);
        };
    </script>
</body>
</html>
